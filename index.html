async function login(email, password) {
  const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, { method: "POST", headers: { apikey: ANON, "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
  const d = await r.json(); if (!r.ok) throw new Error(d.error_description || d.msg || d.error || "登入失敗"); return d;
}
async function rest(path, { method = "GET", token, body, prefer } = {}) {
  const h = { apikey: ANON, Authorization: `Bearer ${token}`, "Content-Type": "application/json" };
  if (prefer) h.Prefer = prefer;
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
  const t = await r.text(); const d = t ? JSON.parse(t) : null;
  if (!r.ok) throw new Error((d && (d.message || d.hint)) || "資料庫錯誤"); return d;
}
async function fn(action, payload, token) {
  const r = await fetch(`${SUPA_URL}/functions/v1/admin-manage`, { method: "POST", headers: { apikey: ANON, Authorization: `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify({ action, ...payload }) });

}

}
// 在本機把圖片縮小到長邊 maxSide 並壓成 JPEG，大幅減少傳輸與後端寫入時間
async function compressImage(file, maxSide = 1600, quality = 0.82) {
  if (!file || !file.type?.startsWith("image/")) return file;
  try {
    const bitmap = await (window.createImageBitmap ? createImageBitmap(file) : new Promise((res, rej) => {
      const img = new Image(); img.onload = () => res(img); img.onerror = rej; img.src = URL.createObjectURL(file);
    }));
    const w0 = bitmap.width || bitmap.naturalWidth;
    const h0 = bitmap.height || bitmap.naturalHeight;
    const scale = Math.min(1, maxSide / Math.max(w0, h0));
    const w = Math.round(w0 * scale), h = Math.round(h0 * scale);
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(bitmap, 0, 0, w, h);
    const blob = await new Promise((res) => canvas.toBlob(res, "image/jpeg", quality));
    if (!blob || blob.size >= file.size) return file;
    return new File([blob], (file.name || "img").replace(/\.[^.]+$/, "") + ".jpg", { type: "image/jpeg" });
  } catch (e) { return file; }
}
async function uploadTo(bucket, file, token) {
  const f = await compressImage(file);
  const ext = "jpg";
  const b64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result).split(",")[1]);
    r.onerror = () => rej(new Error("讀取檔案失敗"));
    r.readAsDataURL(f);
  });
  const r = await fetch(`${SUPA_URL}/functions/v1/upload-asset`, {
    method: "POST",
    headers: { apikey: ANON, Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ bucket, ext, base64: b64, contentType: "image/jpeg" }),
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || "上傳失敗");
  return d;
}
async function uploadPkgPhoto(file, token) {
  const r = await uploadTo("package-photos", file, token);
  return r.publicUrl;
}

// ZXing：iOS Safari/Chrome 沒有原生 BarcodeDetector，必須靠 ZXing 解碼。
// 多 CDN 並行嘗試（哪個先到用哪個），含中國／亞太友善鏡像；總超時 10 秒。
let __zxingPromise = null;
function ensureZXing(timeoutMs = 10000) {
  if (typeof window === "undefined") return Promise.resolve(false);
  if (window.ZXingBrowser) return Promise.resolve(true);
  if (__zxingPromise) return __zxingPromise;
  const urls = [
    "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js",
    "https://fastly.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js",
    "https://gcore.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js",
    "https://testingcf.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js",
    "https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js",
    "https://npm.elemecdn.com/@zxing/browser@0.1.5/umd/index.min.js",
    "https://cdn.staticfile.org/zxing-browser/0.1.5/index.min.js",
    "https://lib.baomitu.com/zxing-js/0.18.6/index.min.js",
    "https://cdn.bootcdn.net/ajax/libs/zxing-js/0.18.6/index.min.js",
  ];
  __zxingPromise = new Promise((res) => {
    let done = false;
    const finish = (ok) => { if (done) return; done = true; res(ok); if (!ok) __zxingPromise = null; };
    // 並行載入所有 CDN，第一個成功的就接管
    urls.forEach((url) => {
      const s = document.createElement("script");
      s.src = url; s.async = true; s.crossOrigin = "anonymous";
      s.onload = () => { if (window.ZXingBrowser) finish(true); };
      s.onerror = () => {};
      document.head.appendChild(s);
    });
    // 總超時
    setTimeout(() => finish(!!window.ZXingBrowser), timeoutMs);
  });
  return __zxingPromise;
}
if (typeof window !== "undefined") setTimeout(() => ensureZXing(), 100);

// Session 持久化（localStorage）
const SESS_KEY = "yq_admin_session";
function loadAdminSess() { try { const s = localStorage.getItem(SESS_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; } }
function saveAdminSess(s) { try { localStorage.setItem(SESS_KEY, JSON.stringify(s)); } catch (e) {} }
function clearAdminSess() { try { localStorage.removeItem(SESS_KEY); } catch (e) {} }
async function refreshAdminToken(refresh_token) {
  const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, { method: "POST", headers: { apikey: ANON, "Content-Type": "application/json" }, body: JSON.stringify({ refresh_token }) });
  const d = await r.json(); if (!r.ok) throw new Error(d.error_description || d.msg || "session expired"); return d;
}

const SP_SESS_KEY = "yq_sp_session";
function loadSpSess() { try { const s = localStorage.getItem(SP_SESS_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; } }
function saveSpSess(s) { try { localStorage.setItem(SP_SESS_KEY, JSON.stringify(s)); } catch (e) {} }
function clearSpSess() { try { localStorage.removeItem(SP_SESS_KEY); } catch (e) {} }

function App() {
  const [session, setSession] = useState(null);
  const [spSession, setSpSession] = useState(null);  // 業務員 session
  const [booting, setBooting] = useState(true);
  const [toast, setToast] = useState("");
  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2600); };
  useEffect(() => {
    const l = document.createElement("link"); l.rel = "stylesheet";
    l.href = "https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap";
    document.head.appendChild(l);
    (async () => {
      // 先檢查業務員 session
      const sp = loadSpSess();
      if (sp?.sp_token && sp?.sp_id) {
        try {
          const r = await fetch(`${SUPA_URL}/functions/v1/salesperson-api`, {
            method: "POST",
            headers: { apikey: ANON, "Content-Type": "application/json" },
            body: JSON.stringify({ action: "me", sp_token: sp.sp_token, sp_id: sp.sp_id }),
          });
          const d = await r.json();
          if (r.ok && d.ok) {
            setSpSession({ sp_token: sp.sp_token, sp_id: sp.sp_id, salesperson: d.salesperson });
            setBooting(false); return;
          } else clearSpSess();
        } catch (e) { clearSpSess(); }
      }
      // 管理員 session
      const saved = loadAdminSess();
      if (!saved?.token) { setBooting(false); return; }
      try {
        const rows = await rest(`admins?auth_user_id=eq.${saved.me?.auth_user_id}&select=*`, { token: saved.token });
        const me = rows && rows[0];
        if (me && me.is_active) {
          setSession({ token: saved.token, refresh_token: saved.refresh_token, me });
        } else throw new Error("invalid");
      } catch (e) {
        if (saved.refresh_token) {
          try {
            const d = await refreshAdminToken(saved.refresh_token);
            const rows = await rest(`admins?auth_user_id=eq.${d.user.id}&select=*`, { token: d.access_token });
            const me = rows && rows[0];
            if (me && me.is_active) {
              const s = { token: d.access_token, refresh_token: d.refresh_token, me };
              saveAdminSess(s); setSession(s);
            } else clearAdminSess();
          } catch (e2) { clearAdminSess(); }
        } else clearAdminSess();
      }
      setBooting(false);
    })();
  }, []);
  const handleLogin = (s) => { saveAdminSess(s); setSession(s); };
  const handleLogout = () => { clearAdminSess(); setSession(null); };
  const handleSpLogin = (s) => { saveSpSess(s); setSpSession(s); };
  const handleSpLogout = () => { clearSpSess(); setSpSession(null); };
  if (booting) return (<div className="admin-wrap"><style>{CSS}</style><div className="login"><div className="login-card" style={{textAlign:"center"}}>載入中…</div></div></div>);
  return (
    <div className="admin-wrap">
      <style>{CSS}</style>
      {spSession ? <SpDashboard spSession={spSession} setSpSession={setSpSession} onLogout={handleSpLogout} flash={flash} />
        : session ? <Dashboard session={session} onLogout={handleLogout} flash={flash} />
        : <Login onLogin={handleLogin} onSpLogin={handleSpLogin} />}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function Login({ onLogin, onSpLogin }) {
  const [mode, setMode] = useState("admin"); // admin | sp
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [spUser, setSpUser] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setErr(""); setBusy(true);
    try {
      if (mode === "admin") {
        const auth = await login(email.trim(), pw);
        const rows = await rest(`admins?auth_user_id=eq.${auth.user.id}&select=*`, { token: auth.access_token });
        const me = rows && rows[0];
        if (!me) throw new Error("此帳號不是管理員");
        if (!me.is_active) throw new Error("此管理員帳號已停用");
        onLogin({ token: auth.access_token, refresh_token: auth.refresh_token, me });
      } else {
        if (!spUser.trim() || !pw) throw new Error("請輸入業務員帳號與密碼");
        const r = await fetch(`${SUPA_URL}/functions/v1/salesperson-api`, {
          method: "POST",
          headers: { apikey: ANON, "Content-Type": "application/json" },
          body: JSON.stringify({ action: "login", username: spUser.trim(), password: pw }),
        });
        const d = await r.json();
        if (!r.ok || !d.ok) throw new Error(d.error || "登入失敗");
        onSpLogin({ sp_token: d.token, sp_id: d.salesperson.id, salesperson: d.salesperson });
      }
    } catch (e) { setErr(e.message); }
    setBusy(false);
  };

  return (
    <div className="login"><div className="login-card">
      <div className="brand-row"><div className="brand-mark">雲</div><div><div className="brand-t">雲橋集運</div><div className="brand-s">{mode === "admin" ? "管理後台" : "業務員後台"}</div></div></div>
      <div className="login-tabs">
        <button className={mode === "admin" ? "on" : ""} onClick={() => { setMode("admin"); setErr(""); }}>管理員登入</button>
        <button className={mode === "sp" ? "on" : ""} onClick={() => { setMode("sp"); setErr(""); }}>業務員登入</button>
      </div>
      {mode === "admin" ? (
        <>
          <label className="fld"><span>管理員 Email</span><input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="admin@example.com" onKeyDown={(e) => e.key === "Enter" && submit()} /></label>
          <label className="fld"><span>密碼</span><input type="password" value={pw} onChange={(e) => setPw(e.target.value)} placeholder="輸入密碼" onKeyDown={(e) => e.key === "Enter" && submit()} /></label>
        </>
      ) : (
        <>
          <label className="fld"><span>業務員帳號</span><input value={spUser} onChange={(e) => setSpUser(e.target.value)} placeholder="業務員登入帳號" onKeyDown={(e) => e.key === "Enter" && submit()} autoComplete="username" /></label>
          <label className="fld"><span>密碼</span><input type="password" value={pw} onChange={(e) => setPw(e.target.value)} placeholder="輸入密碼" onKeyDown={(e) => e.key === "Enter" && submit()} /></label>
          <div className="login-hint">業務員帳號由總後台建立，如未取得請聯繫管理員。</div>
        </>
      )}
      {err && <div className="err">{err}</div>}
      <button className="btn primary block" disabled={busy} onClick={submit}>{busy ? "登入中…" : "登入"}</button>
    </div></div>
  );
}

  const { me } = session;

  const canAdmins = has("admin.manage");

  const canFin = has("finance.verify") || has("finance.orders");
  const canFinOrd = has("finance.orders");
  const canSet = has("settings.rates") || has("settings.points") || has("settings.coupons") || has("finance.qr");
  const canSp = has("salespersons.manage") || has("salespersons.view");

    { key: "pack",         label: "打包出貨", icon: "🚚", on: canPack },
    { key: "finance",      label: "財務",     icon: "💳", on: canFin },
    { key: "members",      label: "會員管理", icon: "👥", on: canCust },
    { key: "salespersons", label: "業務員管理", icon: "🎯", on: canSp },
    { key: "settings",     label: "營運設定", icon: "⚙",  on: canSet },
    { key: "admins",       label: "管理員帳號", icon: "👤", on: canAdmins },
  ];
  const first = NAV.find((n) => n.on && n.key !== "home")?.key || "home";
  const [tab, setTab] = useState(first);
  const [navOpts, setNavOpts] = useState({});
  const goto = (key, opts = {}) => {
    const item = NAV.find((n) => n.key === key);
    if (!item || !item.on) return;
    setNavOpts(opts);
    setTab(key);
  };
  const setTabClean = (k) => { setNavOpts({}); setTab(k); };
  return (
    <div className="dash">
      <header className="topbar">
        <div className="brand-row sm"><div className="brand-mark sm">雲</div><b>雲橋集運 後台</b></div>
        <div className="who"><span className={"role-badge r-" + me.role}>{ROLE_LABEL[me.role] || me.role}</span><span className="who-name">{me.display_name || me.email}</span><button className="btn ghost tiny" onClick={onLogout}>登出</button></div>
      </header>
      <div className="body">

          {NAV.map((n) => <button key={n.key} disabled={!n.on} className={"nav " + (tab === n.key ? "on" : "") + (n.on ? "" : " soon")} onClick={() => n.on && setTabClean(n.key)}><span className="nav-i">{n.icon}</span>{n.label}{!n.on && <i className="soon-tag">無權限</i>}</button>)}
        </nav>
        <main className="main">
          {tab === "home" && <Overview me={me} session={session} goto={goto} has={has} />}
          {tab === "stats" && <StatsPage session={session} />}
          {tab === "warehouse" && canWh && <Warehouse session={session} has={has} flash={flash} initialSub={navOpts.sub} />}
          {tab === "pack" && canPack && <PackOps session={session} flash={flash} />}
          {tab === "finance" && canFin && <FinancePage session={session} has={has} flash={flash} initialSub={navOpts.sub} initialFilter={navOpts.filter} />}
          {tab === "settings" && canSet && <SettingsPage session={session} has={has} flash={flash} />}
          {tab === "members" && canCust && <MembersPage session={session} flash={flash} initialSort={navOpts.sort} />}
          {tab === "salespersons" && canSp && <SalespersonsPage session={session} has={has} flash={flash} />}
          {tab === "admins" && canAdmins && <AdminsPage session={session} flash={flash} />}
        </main>
      </div>
    </div>
  );
}

// 日期工具
function fmtDate(d) { return d instanceof Date ? d.toISOString().slice(0, 10) : String(d).slice(0, 10); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function today() { return fmtDate(new Date()); }
function monthStart(offset = 0) {
  const d = new Date(); d.setMonth(d.getMonth() + offset); d.setDate(1);
  return fmtDate(d);
}
function monthEnd(offset = 0) {
  const d = new Date(); d.setMonth(d.getMonth() + offset + 1); d.setDate(0);
  return fmtDate(d);
}
function weekStart() { const d = new Date(); d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); return fmtDate(d); }

// 時間篩選器元件
function DateRangePicker({ value, onChange }) {
  const presets = [
    { label: "今日",   start: today(),      end: today() },
    { label: "本週",   start: weekStart(),  end: today() },
    { label: "本月",   start: monthStart(), end: today() },
    { label: "上月",   start: monthStart(-1), end: monthEnd(-1) },
    { label: "近三月", start: fmtDate(addDays(new Date(), -90)), end: today() },
  ];
  const [custom, setCustom] = React.useState(false);
  const isPreset = (p) => value.start === p.start && value.end === p.end;
  return (
    <div className="drp">
      <div className="drp-presets">
        {presets.map(p => (
          <button key={p.label} className={"drp-btn" + (isPreset(p) ? " on" : "")}
            onClick={() => { onChange(p); setCustom(false); }}>
            {p.label}
          </button>
        ))}
        <button className={"drp-btn" + (custom ? " on" : "")} onClick={() => setCustom(v => !v)}>
          自訂 ▾
        </button>
      </div>
      {custom && (
        <div className="drp-custom">
          <input type="date" value={value.start} max={value.end}
            onChange={e => onChange({ ...value, start: e.target.value })} />
          <span>至</span>
          <input type="date" value={value.end} min={value.start} max={today()}
            onChange={e => onChange({ ...value, end: e.target.value })} />
        </div>
      )}
      <span className="drp-range">{value.start} ～ {value.end}</span>
    </div>
  );
}

// SVG 折線圖
function LineChart({ data, keyX, keyY, label, color = "#1B3A6B", height = 160 }) {
  if (!data || data.length === 0) return <div className="chart-empty">暫無數據</div>;
  const vals = data.map(d => Number(d[keyY] || 0));
  const max = Math.max(...vals, 1);
  const min = 0;
  const W = 520; const H = height; const PL = 44; const PR = 12; const PT = 12; const PB = 28;
  const cw = W - PL - PR; const ch = H - PT - PB;
  const pts = data.map((d, i) => {
    const x = PL + (i / Math.max(data.length - 1, 1)) * cw;
    const y = PT + ch - ((Number(d[keyY] || 0) - min) / (max - min)) * ch;
    return [x, y];
  });
  const polyline = pts.map(([x, y]) => `${x},${y}`).join(" ");
  const area = `M ${pts[0][0]},${PT + ch} ` + pts.map(([x, y]) => `L ${x},${y}`).join(" ") + ` L ${pts[pts.length - 1][0]},${PT + ch} Z`;
  // Y 軸刻度
  const yticks = [0, 0.25, 0.5, 0.75, 1].map(r => ({ r, v: Math.round(min + (max - min) * r) }));
  // X 軸標籤（最多顯示 7 個）
  const step = Math.max(1, Math.floor(data.length / 7));
  const xlabels = data.filter((_, i) => i % step === 0 || i === data.length - 1);
  return (
    <div className="chart-wrap">
      <div className="chart-label">{label}</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: H }}>
        {/* 網格 */}
        {yticks.map(({ r, v }) => {
          const y = PT + ch - r * ch;
          return (
            <g key={r}>
              <line x1={PL} y1={y} x2={W - PR} y2={y} stroke="#EAECF0" strokeWidth="1" />
              <text x={PL - 6} y={y + 4} textAnchor="end" fontSize="10" fill="#9AA5B4">{v}</text>
            </g>
          );
        })}
        {/* 面積 */}
        <path d={area} fill={color} opacity="0.1" />
        {/* 折線 */}
        <polyline points={polyline} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" />
        {/* 點 */}
        {pts.map(([x, y], i) => (
          <circle key={i} cx={x} cy={y} r="3.5" fill={color} stroke="#fff" strokeWidth="1.5" />
        ))}
        {/* X 軸標籤 */}
        {xlabels.map((d, i) => {
          const origIdx = data.indexOf(d);
          const x = PL + (origIdx / Math.max(data.length - 1, 1)) * cw;
          return <text key={i} x={x} y={H - 4} textAnchor="middle" fontSize="9.5" fill="#9AA5B4">{String(d[keyX]).slice(5)}</text>;
        })}
      </svg>
    </div>
  );
}

// CSV 匯出工具
function exportCsv(rows, headers, filename) {
  const bom = "\uFEFF"; // Excel 繁體中文 BOM
  const lines = [headers.map(h => h.label).join(",")];
  rows.forEach(r => lines.push(headers.map(h => {
    const v = String(r[h.key] ?? "").replace(/"/g, '""');
    return v.includes(",") || v.includes("\n") ? `"${v}"` : v;
  }).join(",")));
  const blob = new Blob([bom + lines.join("\n")], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// 環比計算
function pct(now, prev) {
  if (!prev || prev === 0) return null;
  const p = ((now - prev) / prev * 100);
  return { val: Math.abs(p).toFixed(1), up: p >= 0 };
}

// 環比標籤元件
function TrendBadge({ now, prev }) {
  const t = pct(Number(now || 0), Number(prev || 0));
  if (!t) return <span className="trend-na">—</span>;
  return <span className={"trend-badge " + (t.up ? "up" : "down")}>{t.up ? "▲" : "▼"} {t.val}%</span>;
}

// 統計 KPI 卡
function KpiCard({ label, value, sub, trend, trendLabel, highlight }) {
  return (
    <div className={"kpi-card" + (highlight ? " highlight" : "")}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value ?? "—"}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
      {trend !== undefined && trendLabel && (
        <div className="kpi-trend"><span className="kpi-prev">{trendLabel}</span><TrendBadge now={value?.toString().replace(/[^0-9.]/g,"")} prev={trend?.toString().replace(/[^0-9.]/g,"")} /></div>
      )}
    </div>
  );
}

function Scanner({ onDetect, onClose }) {
  const videoRef = useRef(null);
  const [on, setOn] = useState(false);
  const [err, setErr] = useState("");
  const [info, setInfo] = useState("");
  const streamRef = useRef(null);
  const timerNativeRef = useRef(null);
  const zxingControlsRef = useRef(null);
  const detectedRef = useRef(false);

  const stop = () => {
    detectedRef.current = false;
    if (timerNativeRef.current) { clearInterval(timerNativeRef.current); timerNativeRef.current = null; }
    if (zxingControlsRef.current) { try { zxingControlsRef.current.stop(); } catch (e) {} zxingControlsRef.current = null; }
    if (streamRef.current) { streamRef.current.getTracks().forEach((t) => t.stop()); streamRef.current = null; }
    if (videoRef.current) { try { videoRef.current.srcObject = null; } catch (e) {} }
    setOn(false);
  };

  const detected = (code) => {
    if (!code || detectedRef.current) return;
    detectedRef.current = true;
    try { navigator.vibrate && navigator.vibrate(80); } catch (e) {}
    setInfo(`✓ 掃到：${code}`);
    stop();
    onDetect(String(code).trim());
  };

  const start = async () => {
    setErr(""); setInfo("正在啟動相機…");
    if (!navigator.mediaDevices?.getUserMedia) {
      setErr("此瀏覽器不支援相機。請改用 Chrome／Safari，並以 HTTPS 開啟。"); setInfo(""); return;
    }
    setOn(true);
    await new Promise((r) => setTimeout(r, 80));
    try {
      const ua = navigator.userAgent || "";
      const isiOS = /iPhone|iPad|iPod/i.test(ua);
      const baseConstraints = { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } };
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { ...baseConstraints, facingMode: { exact: "environment" } }, audio: false });
      } catch (e) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { ...baseConstraints, facingMode: { ideal: "environment" } }, audio: false });
        } catch (e2) {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }
      }
      streamRef.current = stream;
      const v = videoRef.current;
      if (!v) throw new Error("video 元素未就緒");
      v.setAttribute("playsinline", "true"); v.setAttribute("muted", "true");
      v.muted = true; v.autoplay = true; v.playsInline = true;
      v.srcObject = stream;
      await v.play().catch(() => {});

      try {
        const track = stream.getVideoTracks()[0];
        const caps = track.getCapabilities ? track.getCapabilities() : {};
        const adv = [];
        if (caps.focusMode && caps.focusMode.includes("continuous")) adv.push({ focusMode: "continuous" });
        if (adv.length) await track.applyConstraints({ advanced: adv });
      } catch (e) {}

      setInfo("對準快遞條碼，自動辨識中…");

      const hasNative = "BarcodeDetector" in window;
      let nativeWorks = false;

      if (hasNative && !isiOS) {
        try {
          const formats = ["code_128", "ean_13", "ean_8", "code_39", "qr_code", "upc_a", "upc_e", "itf", "codabar"];
          let supported = formats;
          try { supported = await window.BarcodeDetector.getSupportedFormats(); } catch (e) {}
          const useFormats = formats.filter((f) => supported.includes(f));
          const det = new window.BarcodeDetector({ formats: useFormats.length ? useFormats : undefined });
          timerNativeRef.current = setInterval(async () => {
            if (detectedRef.current || !v.videoWidth) return;
            try { const codes = await det.detect(v); if (codes && codes.length) detected(codes[0].rawValue); } catch (e) {}
          }, 100);
          nativeWorks = true;
        } catch (e) {}
      }

      const needZX = isiOS || !nativeWorks;
      if (needZX) {
        setInfo("正在載入辨識函式庫…若太慢請直接看畫面手動輸入單號");
        const zok = await ensureZXing();
        if (zok && window.ZXingBrowser) {
          try {
            const ZX = window.ZXingBrowser;
            const reader = new ZX.BrowserMultiFormatReader();
            const controls = await reader.decodeFromVideoElementContinuously(v, (result, e) => {
              if (detectedRef.current) return;
              if (result) detected(result.getText());
            });
            zxingControlsRef.current = controls;
            setInfo("對準快遞條碼，自動辨識中…");
          } catch (e) {
            setInfo("自動辨識暫不可用，請對準條碼看著畫面，把單號手動輸入到上方欄位。");
          }
        } else {
          setInfo("自動辨識暫不可用，請對準條碼看著畫面，把單號手動輸入到上方欄位即可。");
        }
      }
    } catch (e) {
      const msg = e?.name === "NotAllowedError" ? "已拒絕相機權限，請到瀏覽器設定允許後再試。" :
                  e?.name === "NotFoundError" ? "找不到相機。" :
                  ("無法開啟相機：" + (e?.message || ""));
      setErr(msg); setInfo(""); stop();
    }
  };

  // 元件掛載即自動啟動相機，不需二次點擊
  useEffect(() => { start(); return () => stop(); }, []);

  const handleClose = () => { stop(); onClose && onClose(); };

  return (
    <div className="scanner">
      {on && (
        <div className="scan-frame">
          <video ref={videoRef} className="scan-video" muted playsInline autoPlay />
          <div className="scan-line" />
          <button type="button" className="scan-close" onClick={handleClose} aria-label="關閉掃描">✕</button>
        </div>
      )}
      {info && <div className="scan-info">{info}</div>}
      {err && (
        <>
          <div className="err">{err}</div>
          <button type="button" className="btn ghost" onClick={handleClose}>關閉</button>
        </>
      )}
      <div className="hint">支援 EAN／Code128／Code39／UPC／QR／Codabar 等主流條碼。需以 HTTPS 開啟並允許相機權限。</div>
    </div>
  );
}

function Intake({ session, has, flash }) {
  const { token } = session;
  const [tracking, setTracking] = useState("");
  const [state, setState] = useState(null); // {kind:'matched',pkg,user,batch,suggest} | {kind:'done',pkg} | {kind:'notfound'}
  const [busy, setBusy] = useState(false);
  const [scanOn, setScanOn] = useState(false);

  const lookup = async (t) => {
    const code = (t ?? tracking).trim(); if (!code) return;
    setBusy(true); setState(null);
    try {
      const rows = await rest(`packages?tracking_no=eq.${encodeURIComponent(code)}&select=*&order=created_at.desc`, { token });
      const pkg = rows && rows[0];
      if (!pkg) { setState({ kind: "notfound", tracking: code }); }
      else if (pkg.status === "pending" && pkg.user_id) {
        const [u] = await rest(`app_users?id=eq.${pkg.user_id}&select=*`, { token });
        const batch = await rest(`packages?user_id=eq.${pkg.user_id}&select=*&order=created_at.asc`, { token });
        const suggest = batch.find((b) => b.shelf_code)?.shelf_code || "";
        setState({ kind: "matched", pkg, user: u, batch, suggest });
      } else { setState({ kind: "done", pkg }); }
    } catch (e) { flash(e.message); }
    setBusy(false);
  };

  return (
    <div>
      <div className="card">
        <div className="fld-label">掃描或輸入快遞單號</div>
        <div className="coupon-row" style={{ marginTop: 6 }}>
          <input className="mono" placeholder="快遞單號" value={tracking} onChange={(e) => setTracking(e.target.value)} onKeyDown={(e) => e.key === "Enter" && lookup()} />
          {has("warehouse.scan") && <button className="btn scan-btn" type="button" onClick={() => setScanOn(true)}>📷 掃條碼</button>}
          <button className="btn primary" disabled={busy} onClick={() => lookup()}>{busy ? "查詢中…" : "查詢"}</button>
        </div>
        {scanOn && has("warehouse.scan") && (
          <div style={{ marginTop: 12 }}>
            <Scanner onDetect={(c) => { setTracking(c); setScanOn(false); lookup(c); }} onClose={() => setScanOn(false)} />
          </div>
        )}
      </div>

      {state?.kind === "notfound" && has("warehouse.abnormal") && (
        <WeighForm title="查無此單號 → 建立異常包裹" abnormal tracking={state.tracking} token={token}
          onDone={() => { flash("已建立異常包裹"); setState(null); setTracking(""); }} />
      )}
      {state?.kind === "notfound" && !has("warehouse.abnormal") && (
        <div className="warn">查無此單號，且你沒有「處理異常包裹」權限。</div>
      )}

      {state?.kind === "done" && (
        <div className="card"><div className="ok">此單號已處理：{PKG_LABEL[state.pkg.status]}，重量 {state.pkg.weight ?? "—"} kg，貨架 {state.pkg.shelf_code || "—"}。</div></div>
      )}

      {state?.kind === "matched" && (
        <>
          <div className="card user-card">
            <div className="uc-h"><b>{state.user?.username}</b><span className="mono small">{state.user?.country_code?.replace("-CA","")} {state.user?.phone}</span></div>
            <div className="small">本批包裹（{state.batch.length} 件）：</div>
            <div className="batch">
              {state.batch.map((b) => (
                <div key={b.id} className={"batch-row " + (b.id === state.pkg.id ? "cur" : "")}>
                  <span className="mono small">{b.tracking_no}</span>
                  <span className={"chip " + (b.status === "arrived" ? "chip-leaf" : b.status === "pending" ? "chip-grey" : "chip-sea")}>{PKG_LABEL[b.status]}</span>
                  {b.shelf_code && <span className="shelf">貨架 {b.shelf_code}</span>}
                </div>
              ))}
            </div>
            {state.suggest && <div className="suggest">📍 此用戶已有包裹在貨架 <b>{state.suggest}</b>，建議集中放同一貨架</div>}
          </div>
          <WeighForm title="秤重・拍照・上架" pkg={state.pkg} suggest={state.suggest} token={token}
            onDone={() => { flash("已完成上架，用戶可看到重量與照片"); setState(null); setTracking(""); }} />
        </>
      )}
    </div>
  );
}

function WeighForm({ title, pkg, abnormal, tracking, suggest, token, onDone }) {
  const [weight, setWeight] = useState("");
  const [shelf, setShelf] = useState(suggest || "");
  const [product, setProduct] = useState("");
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [shelves, setShelves] = useState([]);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  useEffect(() => { (async () => { try { setShelves(await rest("shelves?select=code&order=code.asc", { token })); } catch (e) {} })(); }, []);
  const onFile = (e) => { const f = e.target.files?.[0]; if (f) { setFile(f); setPreview(URL.createObjectURL(f)); } };
  const submit = async () => {
    setErr("");
    const w = parseFloat(weight);
    if (!(w > 0)) return setErr("請輸入正確重量");
    if (!shelf) return setErr("請選擇或輸入貨架");
    setBusy(true);
    try {
      let photo_url = null;
      if (file) photo_url = await uploadPkgPhoto(file, token);
      if (abnormal) {
        await rest("packages", { token, method: "POST", prefer: "return=minimal", body: { tracking_no: tracking, product_name: product || null, is_abnormal: true, status: "abnormal", weight: w, shelf_code: shelf, photo_url, arrived_at: new Date().toISOString() } });
      } else {
        await rest(`packages?id=eq.${pkg.id}`, { token, method: "PATCH", prefer: "return=minimal", body: { status: "arrived", weight: w, shelf_code: shelf, photo_url, arrived_at: new Date().toISOString() } });
      }
      onDone();
    } catch (e) { setErr(e.message); }
    setBusy(false);
  };
  return (
    <div className="card weigh">
      <div className="weigh-h">{title}</div>
      {abnormal && <label className="fld"><span>商品名稱（選填）</span><input value={product} onChange={(e) => setProduct(e.target.value)} placeholder="不確定可留空" /></label>}
      <div className="form-grid2">
        <label className="fld"><span>重量（公斤）</span><input className="mono" inputMode="decimal" value={weight} onChange={(e) => setWeight(e.target.value)} placeholder="例：0.85" /></label>
        <label className="fld"><span>貨架</span>
          <input list="shelflist" value={shelf} onChange={(e) => setShelf(e.target.value)} placeholder="例：A1" />
          <datalist id="shelflist">{shelves.map((s) => <option key={s.code} value={s.code} />)}</datalist>
        </label>
      </div>
      <label className="upload">{preview ? <img src={preview} alt="pkg" /> : <span>📷 拍照 / 上傳包裹照片</span>}<input type="file" accept="image/*" capture="environment" onChange={onFile} hidden /></label>
      {err && <div className="err">{err}</div>}
      <button className="btn primary block" disabled={busy} onClick={submit}>{busy ? "處理中…" : abnormal ? "建立異常包裹" : "完成上架"}</button>
    </div>
  );
}

function AssignBox({ token, pkg, flash, onDone, onCancel }) {
  const [phone, setPhone] = useState(""); const [found, setFound] = useState(null); const [busy, setBusy] = useState(false); const [err, setErr] = useState("");
  const search = async () => {
    setErr(""); setFound(null);
    try { const u = await rest(`app_users?phone=eq.${encodeURIComponent(phone.trim())}&select=*`, { token }); if (!u?.[0]) return setErr("查無此手機號用戶"); setFound(u[0]); }
    catch (e) { setErr(e.message); }
  };
  const assign = async () => {
    setBusy(true);
    try {
      await rest(`packages?id=eq.${pkg.id}`, { token, method: "PATCH", prefer: "return=minimal", body: { user_id: found.id, is_abnormal: false, status: pkg.weight ? "arrived" : "pending" } });
      flash(`已指派給 ${found.username}`); onDone();

  };
  return (

      <div className="form-actions"><button className="btn ghost" onClick={onCancel}>取消</button><button className="btn primary" disabled={!found || busy} onClick={assign}>{busy ? "指派中…" : "確認指派"}</button></div>
    </div>
  );
}

    if (!code.trim()) return flash("請輸入貨架編號");

    catch (e) { flash(e.message); }

  if (!list) return <div className="muted">載入中…</div>;

function PaymentReview({ session, flash, onChange }) {
  const { token } = session;
  const [list, setList] = useState(null);
  const [previews, setPreviews] = useState({});
  const load = async () => {
    try {
      const s = await rest("shipments?status=eq.payment_review&select=*&order=created_at.asc", { token });
      setList(s);
      const ids = Array.from(new Set(s.map((x) => x.user_id)));
      if (ids.length) {
        const us = await rest(`app_users?id=in.(${ids.join(",")})&select=id,username,country_code,phone`, { token });
        const map = Object.fromEntries(us.map((u) => [u.id, u]));
        s.forEach((x) => (x._user = map[x.user_id]));
        setList([...s]);
      }
    } catch (e) { flash(e.message); }
  };
  useEffect(() => { load(); }, []);
  const sign = async (id, path) => {
    if (!path) return;
    try { const r = await ops("signScreenshot", { path }, token); setPreviews((p) => ({ ...p, [id]: r.url })); }
    catch (e) { flash(e.message); }
  };
  const decide = async (id, approve) => {
    try { await ops("verifyPayment", { id, approve }, token); flash(approve ? "已確認付款 → 進入打包中" : "已退回付款"); load(); onChange && onChange(); }
    catch (e) { flash(e.message); }
  };
  if (!list) return <div className="muted">載入中…</div>;
  if (!list.length) return <div className="empty big">目前沒有待確認的付款 🎉</div>;
  return (
    <div className="admin-list">
      {list.map((o) => (
        <div className="card order" key={o.id}>
          <div className="order-h"><span className="mono">{o.order_no}</span><span className="chip chip-grey">待確認付款</span></div>
          <div className="small">{o._user?.username || "—"} · {o._user?.country_code?.replace("-CA","")} {o._user?.phone} · {o.delivery_type === "home" ? "宅配" : "7-11"} · {o.total_weight}kg</div>
          <div className="order-pay"><span>應收 / 已上傳付款方式</span><b className="mono">{o.currency === "TWD" ? "NT$" : "¥"}{o.freight_amount} · {o.payment_method}</b></div>
          {o.payment_screenshot_url && (previews[o.id] ? <img className="shot" src={previews[o.id]} alt="截圖" /> : <button className="btn tiny" onClick={() => sign(o.id, o.payment_screenshot_url)}>查看付款截圖</button>)}
          <div className="ac-actions">
            <button className="btn primary tiny" onClick={() => decide(o.id, true)}>✓ 確認收款</button>
            <button className="btn tiny danger" onClick={() => decide(o.id, false)}>退回（重新付款）</button>
          </div>
        </div>
      ))}
    </div>
  );
}

    { k: "awaiting_payment", label: "待付款" },
    { k: "payment_review", label: "待確認" },
    { k: "packing", label: "打包中" },
    { k: "shipped", label: "已出貨" },
    { k: "today_paid", label: "今日已付款" },
    { k: "today_shipped", label: "今日已出貨" },
  ];
  const todayIso = () => { const d = new Date(); d.setHours(0,0,0,0); return encodeURIComponent(d.toISOString()); };
  const load = async () => {
    try {
      let q = "shipments?select=*&order=created_at.desc&limit=50";
      if (filter === "all") q = "shipments?select=*&order=created_at.desc&limit=50";
      else if (filter === "today_paid") q = `shipments?status=in.(packing,shipped,completed)&paid_at=gte.${todayIso()}&select=*&order=paid_at.desc&limit=100`;
      else if (filter === "today_paid_rmb") q = `shipments?status=in.(packing,shipped,completed)&currency=eq.RMB&paid_at=gte.${todayIso()}&select=*&order=paid_at.desc&limit=100`;
      else if (filter === "today_paid_twd") q = `shipments?status=in.(packing,shipped,completed)&currency=eq.TWD&paid_at=gte.${todayIso()}&select=*&order=paid_at.desc&limit=100`;
      else if (filter === "today_shipped") q = `shipments?status=eq.shipped&shipped_at=gte.${todayIso()}&select=*&order=shipped_at.desc&limit=100`;
      else q = `shipments?status=eq.${filter}&select=*&order=created_at.desc&limit=50`;
      const s = await rest(q, { token });
      const ids = Array.from(new Set(s.map((x) => x.user_id)));
      if (ids.length) {
        const us = await rest(`app_users?id=in.(${ids.join(",")})&select=id,username,phone`, { token });
        const map = Object.fromEntries(us.map((u) => [u.id, u]));
        s.forEach((x) => (x._user = map[x.user_id]));
      }
      setList(s);
    } catch (e) { flash(e.message); }
  };
  useEffect(() => { load(); }, [filter]);
  const LBL = { awaiting_payment: "待付款", payment_review: "待確認付款", packing: "打包中", shipped: "已出貨", completed: "已完成", cancelled: "已取消" };
  const totalWeight = list ? list.reduce((s, o) => s + Number(o.total_weight || 0), 0) : 0;
  const totalAmount = list ? list.reduce((acc, o) => { acc[o.currency] = (acc[o.currency] || 0) + Number(o.freight_amount || 0); return acc; }, {}) : {};
  return (
    <div>
      <div className="subtabs">{FS.map((f) => <button key={f.k} className={"subtab " + (filter === f.k ? "on" : "")} onClick={() => setFilter(f.k)}>{f.label}</button>)}</div>
      {list && list.length > 0 && (filter.startsWith("today_") || filter === "shipped") && (
        <div className="ord-sum">共 {list.length} 筆 · 重量 {totalWeight.toFixed(3)} kg{totalAmount.RMB ? ` · RMB ¥${totalAmount.RMB.toFixed(2)}` : ""}{totalAmount.TWD ? ` · TWD NT$${totalAmount.TWD.toFixed(2)}` : ""}</div>
      )}
      {!list ? <div className="muted">載入中…</div> : list.length === 0 ? <div className="empty big">沒有資料</div> : (
        <div className="admin-list">
          {list.map((o) => (
            <div className="card order" key={o.id}>
              <div className="order-h"><span className="mono">{o.order_no}</span><span className="chip chip-grey">{LBL[o.status] || o.status}</span></div>
              <div className="small">{o._user?.username || "—"} · {o.delivery_type === "home" ? "宅配" : "7-11"} · {o.total_weight}kg · {new Date(o.created_at).toLocaleString("zh-TW")}</div>
              <div className="order-pay"><span>金額</span><b className="mono">{o.currency === "TWD" ? "NT$" : "¥"}{o.freight_amount}</b></div>
              {o.return_tracking_no && <div className="small mono">{o.return_carrier || (o.delivery_type==="711"?"7-ELEVEN":"新竹物流")} · {o.return_tracking_no}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ===================== 打包出貨 ===================== */
function PackOps({ session, flash }) {
  const { token } = session;
  const [list, setList] = useState(null);
  const [openId, setOpenId] = useState(null);
  const load = async () => {
    try {
      const s = await rest("shipments?status=eq.packing&select=*&order=paid_at.asc.nullslast,created_at.asc", { token });
      const ids = Array.from(new Set(s.map((x) => x.user_id)));
      let users = {};
      if (ids.length) { const us = await rest(`app_users?id=in.(${ids.join(",")})&select=id,username,phone`, { token }); users = Object.fromEntries(us.map((u) => [u.id, u])); }
      const sids = s.map((x) => x.id);
      let pkgs = [];
      if (sids.length) pkgs = await rest(`packages?shipment_id=in.(${sids.join(",")})&select=*`, { token });
      const grp = pkgs.reduce((m, p) => ((m[p.shipment_id] = m[p.shipment_id] || []).push(p), m), {});
      s.forEach((x) => { x._user = users[x.user_id]; x._items = grp[x.id] || []; });
      setList(s);
    } catch (e) { flash(e.message); }
  };
  useEffect(() => { load(); }, []);
  if (!list) return <div><h2 className="page-t">打包出貨</h2><div className="muted">載入中…</div></div>;
  return (
    <div>
      <h2 className="page-t">打包出貨</h2>
      {list.length === 0 ? <div className="empty big">目前沒有待打包的訂單 🎉</div> : (
        <div className="admin-list">
          {list.map((o) => (
            <div className="card pack" key={o.id}>
              <div className="order-h"><span className="mono">{o.order_no}</span><span className="chip chip-sea">打包中</span></div>
              <div className="small">{o._user?.username} · {o._user?.phone} · {o.delivery_type === "home" ? "宅配到府" : "7-11 取貨"} · 總重 {o.total_weight}kg</div>
              <div className="recipient-snap">
                <b>收件資訊</b>
                {o.delivery_type === "home"
                  ? <div className="small">{o.recipient_snapshot?.receiver_name} · {o.recipient_snapshot?.phone}<br/>{o.recipient_snapshot?.detail}</div>
                  : <div className="small">7-11 {o.recipient_snapshot?.store_name}門市<br/>取貨人 {o.recipient_snapshot?.receiver_name} · {o.recipient_snapshot?.phone}<br/>{o.recipient_snapshot?.store_addr}</div>}
              </div>
              <div className="pack-items">
                <b>本單包裹（{o._items.length} 件）</b>
                {o._items.map((p) => <div key={p.id} className="batch-row"><span className="mono small">{p.tracking_no}</span><span className="small">{p.product_name}</span><span className="mono small">{p.weight}kg</span>{p.shelf_code && <span className="shelf">{p.shelf_code}</span>}</div>)}
              </div>
              <div className="order-pay"><span>已收金額</span><b className="mono">{o.currency === "TWD" ? "NT$" : "¥"}{o.freight_amount}</b></div>
              {openId === o.id
                ? <ShipForm shipment={o} token={token} onCancel={() => setOpenId(null)} onDone={() => { setOpenId(null); load(); flash("已標記出貨"); }} />
                : <div className="ac-actions"><button className="btn primary" onClick={() => setOpenId(o.id)}>標記出貨</button></div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ShipForm({ shipment, token, onCancel, onDone }) {
  const is711 = shipment.delivery_type === "711";
  const HOME_CARRIERS = ["新竹物流", "黑貓宅急便"];
  const [carrier, setCarrier] = useState(is711 ? "7-ELEVEN" : "新竹物流");
  const [tracking, setTracking] = useState("");
  const [scanOn, setScanOn] = useState(false);
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const onFile = (e) => { const f = e.target.files?.[0]; if (f) { setFile(f); setPreview(URL.createObjectURL(f)); } };
  const submit = async () => {
    setErr("");
    if (!tracking.trim()) return setErr("請填寫回台物流單號");
    setBusy(true);
    try {
      let url = null;
      if (file) { const r = await uploadTo("outbound-photos", file, token); url = r.publicUrl; }
      await ops("markShipped", { id: shipment.id, return_tracking_no: tracking.trim(), outbound_photo_url: url, return_carrier: carrier }, token);
      onDone();
    } catch (e) { setErr(e.message); }
    setBusy(false);
  };
  return (
    <div className="form-box">
      <label className="fld"><span>回台物流商</span>
        {is711
          ? <input className="mono" value="7-ELEVEN" disabled />
          : (
            <div className="seg">
              {HOME_CARRIERS.map((c) => (
                <button key={c} type="button" className={carrier === c ? "on" : ""} onClick={() => setCarrier(c)}>{c}</button>
              ))}
            </div>
          )}
      </label>
      <label className="fld">
        <span>{carrier} 單號</span>
        <div className="track-input-row">
          <input className="mono" value={tracking} onChange={(e) => setTracking(e.target.value)} placeholder={is711 ? "例：F12345678901" : (carrier === "黑貓宅急便" ? "例：123456789012" : "例：TWHCT12345678")} />
          <button type="button" className="btn scan-btn" onClick={() => setScanOn(true)}>📷 掃條碼</button>
        </div>
      </label>
      {scanOn && <Scanner onDetect={(code) => { setTracking(code); setScanOn(false); }} onClose={() => setScanOn(false)} />}
      <label className="upload">{preview ? <img src={preview} alt="out" /> : <span>📷 上傳出貨前包裹照片（建議）</span>}<input type="file" accept="image/*" capture="environment" onChange={onFile} hidden /></label>
      {err && <div className="err">{err}</div>}
      <div className="hint">{is711 ? "7-11 取貨訂單，物流商固定為 7-ELEVEN。" : "宅配訂單預設為新竹物流，可切換為黑貓宅急便。"}可直接掃描宅配／7-11 託運單上的條碼自動帶入單號。出貨後 3–4 天物流系統才會查到動態。</div>
      <div className="form-actions"><button className="btn ghost" onClick={onCancel}>取消</button><button className="btn primary" disabled={busy} onClick={submit}>{busy ? "處理中…" : "確認已出貨"}</button></div>
    </div>
  );
}

function CouponsPanel({ session, flash }) {
  const { token } = session;
  const [list, setList] = useState(null);
  const [form, setForm] = useState({ code: "", discount_twd: "", label: "", usage_limit: "" });
  const load = async () => { try { setList(await rest("coupons?select=*&order=created_at.desc", { token })); } catch (e) { flash(e.message); } };
  useEffect(() => { load(); }, []);
  const add = async () => {
    if (!form.code || !form.discount_twd) return flash("請填編號與折抵金額");
    try {
      await rest("coupons", { token, method: "POST", prefer: "return=minimal", body: { code: form.code.trim().toUpperCase(), discount_twd: Number(form.discount_twd), label: form.label || null, usage_limit: form.usage_limit ? Number(form.usage_limit) : null, is_active: true } });
      setForm({ code: "", discount_twd: "", label: "", usage_limit: "" }); flash("已新增優惠券"); load();
    } catch (e) { flash(e.message); }
  };
  const toggle = async (c) => { try { await rest(`coupons?id=eq.${c.id}`, { token, method: "PATCH", prefer: "return=minimal", body: { is_active: !c.is_active } }); load(); } catch (e) { flash(e.message); } };
  const updateLimit = async (c) => {
    const cur = c.usage_limit == null ? "" : String(c.usage_limit);
    const v = prompt(`調整「${c.code}」的發放總量（留空代表不限量）`, cur);
    if (v === null) return;
    const num = v.trim() === "" ? null : Number(v);
    if (num != null && (!Number.isInteger(num) || num < 0)) return flash("請輸入非負整數");
    if (num != null && num < (c.used_count || 0)) return flash(`不可小於已使用數量（${c.used_count}）`);
    try { await rest(`coupons?id=eq.${c.id}`, { token, method: "PATCH", prefer: "return=minimal", body: { usage_limit: num } }); flash("已更新發放總量"); load(); }
    catch (e) { flash(e.message); }
  };
  const del = async (c) => { if (!confirm(`刪除優惠券 ${c.code}？`)) return; try { await rest(`coupons?id=eq.${c.id}`, { token, method: "DELETE", prefer: "return=minimal" }); load(); } catch (e) { flash(e.message); } };
  if (!list) return <div className="muted">載入中…</div>;
  return (
    <div>
      <div className="card">
        <div className="settings-grid">
          <label className="fld"><span>編號（大寫英數）</span><input className="mono" value={form.code} onChange={(e) => setForm({ ...form, code: e.target.value })} placeholder="例：SUMMER50" /></label>
          <label className="fld"><span>折抵金額 (TWD)</span><input className="mono" inputMode="decimal" value={form.discount_twd} onChange={(e) => setForm({ ...form, discount_twd: e.target.value })} /></label>
          <label className="fld"><span>顯示名稱（選填）</span><input value={form.label} onChange={(e) => setForm({ ...form, label: e.target.value })} placeholder="例：暑期 50 元" /></label>
          <label className="fld"><span>發放總量（張）</span><input className="mono" inputMode="numeric" value={form.usage_limit} onChange={(e) => setForm({ ...form, usage_limit: e.target.value })} placeholder="例：100；留空代表不限量" /></label>
        </div>
        <button className="btn primary block" onClick={add}>＋ 新增優惠券</button>
        <div className="hint">規則：發放總量＝整張券最多可被使用幾次；無論是否設上限，<b>每位用戶都只能使用同一張券 1 次</b>（由系統自動限制）。</div>
      </div>
      <div className="admin-list">
        {list.map((c) => {
          const used = Number(c.used_count || 0);
          const cap = c.usage_limit == null ? null : Number(c.usage_limit);
          const left = cap == null ? null : Math.max(0, cap - used);
          const pct = cap ? Math.min(100, Math.round(used * 100 / cap)) : 0;
          const out = cap != null && left === 0;
          return (
            <div className="card coupon-card" key={c.id}>
              <div className="ac-id">
                <b className="mono">{c.code}</b>
                <span className="chip chip-leaf">折 NT${Number(c.discount_twd)}</span>
                {!c.is_active && <span className="off-tag">停用</span>}
                {out && <span className="off-tag">名額已滿</span>}
              </div>
              <div className="small">{c.label || "—"}</div>
              <div className="coupon-bar-row">
                <div className="coupon-bar">{cap != null && <i style={{ width: pct + "%" }} />}</div>
                <div className="coupon-bar-text">
                  {cap == null ? <>已用 <b>{used}</b> 張 · 不限量</> : <>已用 <b>{used}</b> / {cap} 張 · 剩 <b>{left}</b> 張</>}
                </div>
              </div>
              <div className="ac-actions">
                <button className="btn tiny" onClick={() => updateLimit(c)}>調整發放總量</button>
                <button className="btn tiny" onClick={() => toggle(c)}>{c.is_active ? "停用" : "啟用"}</button>
                <button className="btn tiny danger" onClick={() => del(c)}>刪除</button>
              </div>
            </div>
          );
        })}
      </div>
      <div className="hint">建議：行銷活動發放時，先設一個合理的「發放總量」，把券碼分享到 Facebook／LINE 社群。同一張券每位用戶限用 1 次；發完即停。</div>
    </div>
  );
}

/* ===================== 會員管理 ===================== */
function MembersPage({ session, flash, initialSort }) {
  const { token } = session;
  const [list, setList] = useState(null);
  const [q, setQ] = useState("");
  const [range, setRange] = useState(initialSort === "today"
    ? { start: today(), end: today() }
    : { start: monthStart(), end: today() });
  const [useRange, setUseRange] = useState(initialSort === "today");
  const [detailId, setDetailId] = useState(null);

  const load = async () => {
    try {
      const base = "select=id,username,country,country_code,phone,credit_balance,points,invite_code,is_active,created_at,referred_by_salesperson_id&order=created_at.desc&limit=500";
      let filters = [];
      if (useRange) {
        const s = new Date(range.start); s.setHours(0,0,0,0);
        const e = new Date(range.end); e.setHours(23,59,59,999);
        filters.push(`created_at=gte.${encodeURIComponent(s.toISOString())}`);
        filters.push(`created_at=lte.${encodeURIComponent(e.toISOString())}`);
      }
      if (q.trim()) filters.push(`or=(username.ilike.${encodeURIComponent(`%${q.trim()}%`)},phone.ilike.${encodeURIComponent(`%${q.trim()}%`)},invite_code.ilike.${encodeURIComponent(`%${q.trim()}%`)})`);
      const path = `app_users?${filters.join("&")}&${base}`;
      setList(await rest(path, { token }));
    } catch (e) { flash(e.message); }
  };
  useEffect(() => { load(); }, [range, useRange]);

  if (detailId) return <MemberDetail token={token} userId={detailId} onBack={() => setDetailId(null)} flash={flash} />;

  // 小計統計
  const totalCredit = list ? list.reduce((s, u) => s + Number(u.credit_balance || 0), 0) : 0;
  const spUsers = list ? list.filter(u => u.referred_by_salesperson_id).length : 0;

  return (
    <div>
      <div className="page-h-row">
        <h2 className="page-t">會員管理</h2>
        {list && <div className="hint">找到 <b>{list.length}</b> 位會員</div>}
      </div>

      {/* 篩選 */}
      <div className="stats-filters">
        <label className="switch" style={{marginBottom:0}}>
          <input type="checkbox" checked={useRange} onChange={e => setUseRange(e.target.checked)} />
          <span>按註冊時間篩選</span>
        </label>
        {useRange && <DateRangePicker value={range} onChange={setRange} />}
        <div className="coupon-row" style={{flex:1,marginBottom:0}}>
          <input className="mono" placeholder="搜尋用戶名、手機號或邀請碼" value={q}
            onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === "Enter" && load()} />
          <button className="btn primary" onClick={load}>搜尋</button>
        </div>
      </div>

      {/* 小計卡片 */}
      {list && useRange && (
        <div className="kpi-grid" style={{marginBottom:12}}>
          <KpiCard label="期間新增會員" value={list.length} highlight />
          <KpiCard label="業務員帶來" value={spUsers} sub={`佔比 ${list.length ? Math.round(spUsers/list.length*100) : 0}%`} />
          <KpiCard label="自然流量" value={list.length - spUsers} />
          <KpiCard label="總運費額度" value={`NT$${totalCredit}`} />
        </div>
      )}

      {!list ? <div className="muted">載入中…</div> : list.length === 0 ? <div className="empty big">沒有符合的會員</div> : (
        <div className="admin-list">
          {list.map((u) => (
            <div className="card member-row" key={u.id}>
              <div className="m-main">
                <div className="ac-id">
                  <b>{u.username}</b>
                  {!u.is_active && <span className="off-tag">已停用</span>}
                  <span className="role-badge r-warehouse">{u.country}</span>
                  {u.referred_by_salesperson_id && <span className="chip chip-sea" style={{fontSize:10}}>業務員</span>}
                </div>
                <div className="small mono">{u.country_code.replace("-CA","")} {u.phone}</div>
                <div className="m-meta">
                  <span>註冊 {new Date(u.created_at).toLocaleString("zh-TW")}</span>
                  <span>邀請碼 <b className="mono">{u.invite_code}</b></span>
                  <span>額度 NT${u.credit_balance}</span>
                  <span>積分 {u.points}</span>
                </div>
              </div>
              <button className="btn primary" onClick={() => setDetailId(u.id)}>查看詳情</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// 會員詳情中的業務員指派區塊
function SalespersonAssignBox({ userId, currentSpId, token, flash, onChange }) {
  const [spList, setSpList] = useState(null);
  const [selected, setSelected] = useState(currentSpId || "");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    rest("salespersons?select=id,name,promo_code,is_active&order=name.asc", { token })
      .then(rows => setSpList((rows || []).filter(s => s.is_active)))
      .catch(() => setSpList([]));
  }, []);

  const save = async () => {
    setBusy(true);
    try {
      await spAdminCall("assignUser", { user_id: userId, salesperson_id: selected || null }, token);
      flash(selected ? "已指派業務員" : "已移除業務員歸屬");
      onChange && onChange();
    } catch (e) { flash(e.message); }
    setBusy(false);
  };

  const changed = selected !== (currentSpId || "");
  if (!spList) return null;

  return (
    <div className="assign-sp-box">
      <div className="assign-sp-label">業務員歸屬</div>
      <div className="assign-sp-row">
        <select
          className="assign-sp-select"
          value={selected}
          onChange={e => setSelected(e.target.value)}
        >
          <option value="">— 無業務員（自然流量）—</option>
          {spList.map(sp => (
            <option key={sp.id} value={sp.id}>{sp.name}（{sp.promo_code}）</option>
          ))}
        </select>
        {changed && (
          <button className="btn primary" disabled={busy} onClick={save}>
            {busy ? "儲存中…" : "確認"}
          </button>
        )}
      </div>
      <div className="hint sm">指派後，客戶下次登入將使用該業務員的費率和客服聯繫方式。</div>
    </div>
  );
}

function MemberDetail({ token, userId, onBack, flash }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState("");

  const load = async () => {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/rpc/admin_user_detail`, { method: "POST", headers: { apikey: ANON, Authorization: `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify({ uid: userId }) });
      const d = await r.json(); if (!r.ok) throw new Error(d.message || "讀取失敗");
      setData(d);
    } catch (e) { setErr(e.message); }
  };
  useEffect(() => { load(); }, [userId]);
  if (err) return <div><button className="btn" onClick={onBack}>‹ 返回會員列表</button><div className="err">{err}</div></div>;

  const addrs = data.addresses || [];

  const done = ships.filter((s) => s.status === "shipped" || s.status === "completed");

  const PKG_CHIP = { pending: "chip-grey", arrived: "chip-sea", abnormal: "chip-alert", packed: "chip-leaf", shipped: "chip-leaf" };
  const SHIP_LBL = { awaiting_payment: "待付款", payment_review: "待確認", packing: "打包中", shipped: "已出貨", completed: "已完成", cancelled: "已取消" };

          <div className="ov-card"><span>運費額度</span><b>NT${u.credit_balance}</b><i>已用 {u.credit_used}/20</i></div>
          <div className="ov-card gold"><span>目前積分</span><b>{u.points}</b><i>累計賺 {earned} · 已用 {used}</i></div>
          <div className="ov-card sea"><span>已邀請好友</span><b>{data.referrals_count}</b><i>位</i></div>
          <div className="ov-card leaf"><span>已完成訂單</span><b>{st.orders_done}</b><i>進行中 {st.orders_in_progress}</i></div>
          <div className="ov-card"><span>累計消費 RMB</span><b>¥{Number(st.spent_rmb).toFixed(2)}</b><i>宅配</i></div>

        <button className={"subtab " + (tab === "points" ? "on" : "")} onClick={() => setTab("points")}>積分明細（{ledger.length}）</button>

        if (arr.length === 0) return <div className="empty big">沒有符合的訂單</div>;
        return (
          <div className="admin-list">

              <div className="card order" key={s.id}>

                <div className="small">{new Date(s.created_at).toLocaleString("zh-TW")} · {s.delivery_type === "home" ? "宅配到府" : "7-11 取貨"} · {s.total_weight}kg</div>
                {s.recipient_snapshot && (
                  <div className="recipient-snap">
                    <b>收件資訊</b>
                    {s.delivery_type === "home"
                      ? <div className="small">{s.recipient_snapshot.receiver_name} · {s.recipient_snapshot.phone}<br />{s.recipient_snapshot.detail}</div>

                  </div>
                )}
                <div className="order-pay"><span>金額</span><b className="mono">{s.currency === "TWD" ? "NT$" : "¥"}{s.freight_amount}</b></div>
                {s.return_tracking_no && <div className="small mono">{s.return_carrier || (s.delivery_type==="711"?"7-ELEVEN":"新竹物流")} · {s.return_tracking_no}</div>}
                {s.shipped_at && <div className="small">出貨 {new Date(s.shipped_at).toLocaleString("zh-TW")}</div>}
              </div>
            ))}
          </div>
        );
      })()}

      {tab === "invitees" && (
        invitees.length === 0
          ? <div className="empty big">尚未邀請任何好友</div>
          : (
            <>
              <div className="ord-sum">共邀請 <b>{invitees.length}</b> 位好友 · 累計獲得邀請積分 <b>{invitees.reduce((s, x) => s + Number(x.points_awarded || 0), 0)}</b> 分</div>
              <div className="admin-list">
                {invitees.map((x) => (
                  <div className="card invitee-row" key={x.id}>
                    <div className="avatar">{(x.username || "?").slice(0, 1)}</div>
                    <div className="m-main">
                      <div className="ac-id"><b>{x.username}</b><span className="role-badge r-warehouse">{x.country}</span></div>
                      <div className="small mono">{x.country_code?.replace("-CA", "")} {x.phone}</div>
                      <div className="m-meta">
                        <span>註冊 {new Date(x.created_at).toLocaleString("zh-TW")}</span>
                        <span>已完成訂單 <b>{x.orders_done}</b></span>
                      </div>
                    </div>
                    <div className="invitee-pts">+{x.points_awarded || 0} <i>積分</i></div>
                  </div>
                ))}
              </div>
            </>
          )
      )}

      {tab === "points" && (
        ledger.length === 0
          ? <div className="empty big">尚無積分紀錄</div>
          : (
            <>
              <div className="ord-sum">累計獲得 <b>{earned}</b> 分 · 累計使用 <b>{used}</b> 分 · 目前餘額 <b>{u.points}</b> 分</div>
              <div className="admin-list">
                {ledger.map((l) => {
                  const isIn = l.delta > 0;
                  const reasonLabel = REASON_LBL[l.reason] || l.reason;
                  const detail = l.reason === "referral" && l.invitee_name
                    ? `邀請 ${l.invitee_name} 註冊`
                    : l.reason === "redeem" && l.order_no
                      ? `用於訂單 ${l.order_no}`
                      : "";
                  return (
                    <div className="card pt-row" key={l.id}>
                      <div className="m-main">
                        <div className="ac-id">
                          <b>{reasonLabel}</b>
                          <span className={"chip " + (isIn ? "chip-leaf" : "chip-alert")}>{isIn ? "獲得" : "使用"}</span>
                        </div>
                        {detail && <div className="small">{detail}</div>}
                        <div className="small">{new Date(l.created_at).toLocaleString("zh-TW")}</div>
                      </div>
                      <div className={"pt-delta " + (isIn ? "in" : "out")}>{isIn ? "+" : ""}{l.delta}</div>
                    </div>
                  );
                })}
              </div>
            </>
          )
      )}

      {tab === "addr" && (
        addrs.length === 0 ? <div className="empty big">尚未設定收件資訊</div> : (
          <div className="admin-list">
            {addrs.map((a) => (
              <div className="card" key={a.id}>
                <div className="ac-id">
                  <span className={"chip " + (a.type === "home" ? "chip-sea" : "chip-leaf")}>{a.type === "home" ? "宅配" : "7-11 取貨"}</span>
                </div>
                {a.type === "home"
                  ? <div className="small"><b>{a.receiver_name} · {a.phone}</b><br />{a.detail}</div>
                  : <div className="small"><b>{a.store_name} 門市</b><br />取貨人 {a.receiver_name} · {a.phone}<br />{a.store_addr} · 店號 {a.store_id}</div>}
              </div>
            ))}
          </div>
        )
      )}
    </div>
  );
}

/* ===================== 管理員帳號 ===================== */
function AdminsPage({ session, flash }) {
  const { token, me } = session;
  const [admins, setAdmins] = useState(null); const [catalog, setCatalog] = useState([]); const [templates, setTemplates] = useState({});
  const [creating, setCreating] = useState(false); const [editId, setEditId] = useState(null); const [err, setErr] = useState("");
  const load = async () => {
    try {
      const [a, c, t] = await Promise.all([
        rest("admins?select=*&order=created_at.asc", { token }),
        rest("permission_catalog?select=*&order=sort.asc", { token }),
        rest("role_templates?select=*", { token }),
      ]);
      setAdmins(a); setCatalog(c); setTemplates(Object.fromEntries(t.map((x) => [x.role, x.permissions])));
    } catch (e) { setErr(e.message); }
  };
  useEffect(() => { load(); }, []);
  const groups = catalog.reduce((m, p) => ((m[p.group_label] = m[p.group_label] || []).push(p), m), {});
  if (err) return <div className="err">{err}</div>;
  if (!admins) return <div className="muted">載入中…</div>;
  return (
    <div>
      <div className="page-head"><h2 className="page-t">管理員帳號</h2><button className="btn primary" onClick={() => { setCreating(true); setEditId(null); }}>＋ 新增管理員</button></div>
      {creating && <AdminForm mode="create" me={me} groups={groups} catalog={catalog} templates={templates} onCancel={() => setCreating(false)} onSave={async (p) => { await fn("create", p, token); flash("已新增管理員"); setCreating(false); load(); }} />}
      <div className="admin-list">
        {admins.map((a) => <AdminRow key={a.id} a={a} me={me} token={token} groups={groups} catalog={catalog} templates={templates} expanded={editId === a.id} onToggle={() => setEditId(editId === a.id ? null : a.id)} flash={flash} reload={load} />)}
      </div>
    </div>
  );
}
function AdminRow({ a, me, token, groups, catalog, templates, expanded, onToggle, flash, reload }) {
  const isSelf = a.id === me.id;
  const setActive = async (val) => { try { await rest(`admins?id=eq.${a.id}`, { token, method: "PATCH", body: { is_active: val }, prefer: "return=minimal" }); flash(val ? "已啟用" : "已停用"); reload(); } catch (e) { flash(e.message); } };
  const resetPw = async () => { const np = prompt(`為「${a.display_name || a.email}」設定新密碼（至少 6 碼）`); if (!np) return; try { await fn("resetPassword", { id: a.id, password: np }, token); flash("密碼已重設"); } catch (e) { flash(e.message); } };
  return (
    <div className={"admin-card " + (a.is_active ? "" : "off")}>
      <div className="ac-head"><div className="ac-id"><b>{a.display_name || a.username}</b><span className={"role-badge r-" + a.role}>{ROLE_LABEL[a.role] || a.role}</span>{a.is_super && <span className="role-badge r-super">全部權限</span>}{isSelf && <span className="self-tag">目前登入</span>}{!a.is_active && <span className="off-tag">已停用</span>}</div><div className="ac-email mono">{a.email}</div></div>
      <div className="ac-actions">
        <button className="btn tiny" onClick={onToggle}>{expanded ? "收合" : "編輯權限"}</button>
        <button className="btn tiny" onClick={resetPw}>重設密碼</button>
        {!isSelf && (a.is_active ? <button className="btn tiny danger" onClick={() => setActive(false)}>停用</button> : <button className="btn tiny" onClick={() => setActive(true)}>啟用</button>)}
      </div>
      {expanded && <AdminForm mode="edit" a={a} me={me} groups={groups} catalog={catalog} templates={templates} onCancel={onToggle} onSave={async (p) => { await rest(`admins?id=eq.${a.id}`, { token, method: "PATCH", prefer: "return=minimal", body: { role: p.role, is_super: p.role === "super", permissions: p.permissions } }); flash("已更新權限"); onToggle(); reload(); }} />}
    </div>
  );
}
function AdminForm({ mode, a, me, groups, catalog, templates, onSave, onCancel }) {
  const [display_name, setName] = useState(a?.display_name || "");
  const [email, setEmail] = useState(a?.email || ""); const [password, setPw] = useState("");
  const [role, setRole] = useState(a?.role || "warehouse");
  const [perms, setPerms] = useState(a?.permissions || templates["warehouse"] || []);
  const [busy, setBusy] = useState(false); const [err, setErr] = useState("");
  const allKeys = catalog.map((c) => c.key);
  const applyRole = (r) => { setRole(r); if (r === "super") setPerms(allKeys); else if (templates[r]) setPerms(templates[r]); };
  const toggle = (k) => setPerms((p) => p.includes(k) ? p.filter((x) => x !== k) : [...p, k]);
  const lockedSelf = mode === "edit" && a?.id === me.id;
  const save = async () => {
    setErr(""); setBusy(true);
    try {
      if (mode === "create") { if (!email.trim() || password.length < 6) throw new Error("請填 Email，密碼至少 6 碼"); await onSave({ email: email.trim(), password, display_name, role, permissions: role === "super" ? allKeys : perms }); }
      else { await onSave({ role, permissions: role === "super" ? allKeys : perms }); }
    } catch (e) { setErr(e.message); setBusy(false); }
  };
  return (
    <div className="form-box">
      {mode === "create" && <div className="form-grid"><label className="fld"><span>顯示名稱</span><input value={display_name} onChange={(e) => setName(e.target.value)} placeholder="例：陳小姐" /></label><label className="fld"><span>登入 Email</span><input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="staff@example.com" /></label><label className="fld"><span>初始密碼</span><input value={password} onChange={(e) => setPw(e.target.value)} placeholder="至少 6 碼" /></label></div>}
      <div className="role-pick"><span className="fld-label">角色範本</span>{["warehouse", "finance", "super", "custom"].map((r) => <button key={r} disabled={lockedSelf} className={"chip-btn " + (role === r ? "on" : "")} onClick={() => applyRole(r)}>{ROLE_LABEL[r]}</button>)}</div>
      {lockedSelf && <div className="warn">為避免把自己鎖在門外，無法編輯目前登入帳號的權限。</div>}
      <div className={"perm-groups " + (role === "super" || lockedSelf ? "dim" : "")}>
        {Object.entries(groups).map(([g, items]) => <div className="perm-group" key={g}><div className="perm-g-title">{g}</div>{items.map((p) => <label className="perm-row" key={p.key}><input type="checkbox" disabled={role === "super" || lockedSelf} checked={role === "super" || perms.includes(p.key)} onChange={() => toggle(p.key)} /><span>{p.label}</span></label>)}</div>)}
      </div>
      {role === "super" && <div className="muted sm">超級管理員自動擁有全部權限。</div>}
      {err && <div className="err">{err}</div>}
      <div className="form-actions"><button className="btn ghost" onClick={onCancel}>取消</button><button className="btn primary" disabled={busy || lockedSelf} onClick={save}>{busy ? "儲存中…" : mode === "create" ? "建立帳號" : "儲存權限"}</button></div>
    </div>
  );
}

async function spAdminCall(action, payload, token) {
  const r = await fetch(`${SUPA_URL}/functions/v1/salesperson-admin`, {
    method: "POST",
    headers: { apikey: ANON, Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ action, ...payload }),
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || "操作失敗");
  return d;
}

function SalespersonDetail({ token, sp, onBack, flash }) {

      .then(setData).catch(e => flash(e.message));
  }, []);
  if (!data) return <div className="muted">載入中…</div>;
  const { users, shipments, commissions } = data;
  const pendingComs = commissions.filter(c => c.status === "pending");
  const totalRevenue = shipments.reduce((s, x) => s + Number(x.freight_amount || 0) * (x.currency === "RMB" ? Number(sp.custom_rate_rmb || 4.8) : 1), 0);
  const pendingCom = pendingComs.reduce((s, c) => s + Number(c.commission_twd || 0), 0);
  const settledCom = commissions.filter(c => c.status === "settled").reduce((s, c) => s + Number(c.commission_twd || 0), 0);

  const toggleId = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const selectAll = () => setSelectedIds(pendingComs.map(c => c.id));
  const clearSel = () => setSelectedIds([]);
  const selectedTotal = pendingComs.filter(c => selectedIds.includes(c.id)).reduce((s, c) => s + Number(c.commission_twd || 0), 0);

  // 上傳轉帳憑證
  const uploadProof = (file) => {
    if (!file) return;
    setProofFile(file);
    setProofPreview(URL.createObjectURL(file));
  };

  const doSettle = async () => {
    if (!selectedIds.length) return flash("請選擇要結算的佣金項目");
    setSettling(true);
    try {
      let proofUrl = null;
      // 上傳憑證到 Storage
      if (proofFile) {
        const ext = proofFile.name.split(".").pop() || "jpg";
        const path = `settlement/${sp.id}_${Date.now()}.${ext}`;
        const res = await fetch(`${SUPA_URL}/storage/v1/object/payment-screenshots/${path}`, {
          method: "POST",
          headers: { apikey: ANON, Authorization: `Bearer ${token}` },
          body: proofFile,
        });
        if (res.ok) {
          // 取已簽署 URL 或公開 URL
          const signRes = await fetch(`${SUPA_URL}/functions/v1/ops-actions`, {
            method: "POST",
            headers: { apikey: ANON, Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ action: "signSettlementProof", path }),
          });
          const signData = await signRes.json();
          proofUrl = signData.url || null;
        }
      }
      // 呼叫結算 API
      const r = await fetch(`${SUPA_URL}/functions/v1/ops-actions`, {
        method: "POST",
        headers: { apikey: ANON, Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "settleCommissions",
          salesperson_id: sp.id,
          commission_ids: selectedIds,
          settlement_proof_url: proofUrl,
          settlement_note: settleNote,
        }),
      });
      const d = await r.json();
      if (!r.ok || !d.ok) throw new Error(d.error || "結算失敗");
      flash(`✅ 已結算 ${d.settled_count} 筆佣金，共 NT$${Math.round(selectedTotal)}`);
      setSelectedIds([]);
      setProofFile(null); setProofPreview(null); setSettleNote("");
      // 重新載入
      const fresh = await spAdminCall("stats", { salesperson_id: sp.id }, token);
      setData(fresh);
    } catch (e) { flash(e.message); }
    setSettling(false);
  };

  return (
    <div>
      <div className="page-h-row">
        <h2 className="page-t">{sp.name} — 業績詳情</h2>
        <button className="btn ghost" onClick={onBack}>← 返回列表</button>

          <div className="hint sm">結算前請先掃碼轉帳，再點下方「確認結算」</div>
        </div>
      )}
      {!sp.alipay_qr_url && (
        <div className="warn" style={{ marginBottom: 14 }}>⚠️ 業務員尚未設定支付寶收款碼，請提醒業務員在個人後台上傳。</div>
      )}

      <div className="stats-row">
        <div className="stat-card"><b>{users.length}</b><span>客戶數</span></div>
        <div className="stat-card"><b>{shipments.length}</b><span>訂單數</span></div>
        <div className="stat-card"><b>NT$ {Math.round(totalRevenue)}</b><span>總營收</span></div>
        <div className="stat-card highlight"><b>NT$ {Math.round(pendingCom)}</b><span>待結算佣金</span></div>
        <div className="stat-card"><b>NT$ {Math.round(settledCom)}</b><span>已結佣金</span></div>
      </div>

      {/* 分頁 */}

        <button className={"subtab " + (settleTab === "overview" ? "on" : "")} onClick={() => setSettleTab("overview")}>客戶 & 訂單</button>
        <button className={"subtab " + (settleTab === "settle" ? "on" : "")} onClick={() => setSettleTab("settle")}>
          佣金結算 {pendingComs.length > 0 && <span className="badge-count">{pendingComs.length}</span>}
        </button>
        <button className={"subtab " + (settleTab === "history" ? "on" : "")} onClick={() => setSettleTab("history")}>結算記錄</button>
      </div>

      {/* 客戶 & 訂單 */}

          <div className="card">
            {users.length === 0 ? <div className="muted">尚無客戶</div> : (

async function spApiCall(action, payload, sp_token, sp_id) {
  const r = await fetch(`${SUPA_URL}/functions/v1/salesperson-api`, {
    method: "POST",
    headers: { apikey: ANON, "Content-Type": "application/json" },
    body: JSON.stringify({ action, sp_token, sp_id, ...payload }),
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || "操作失敗");
  return d;
}

// 業務員後台共用時間篩選 Hook
function useSpDateFilter(allShipments, allUsers, allCommissions, dateKey = "created_at") {
  const [range, setRange] = React.useState({ start: monthStart(), end: today() });
  const [showFilter, setShowFilter] = React.useState(false);

  const inRange = (dateStr) => {
    if (!dateStr) return false;
    const d = dateStr.slice(0, 10);
    return d >= range.start && d <= range.end;
  };
  const lastRange = { start: monthStart(-1), end: monthEnd(-1) };
  const inLast = (dateStr) => {
    if (!dateStr) return false;
    const d = dateStr.slice(0, 10);
    return d >= lastRange.start && d <= lastRange.end;
  };

  const ships = (allShipments || []).filter(s => inRange(s[dateKey]));
  const lastShips = (allShipments || []).filter(s => inLast(s[dateKey]));
  const users = (allUsers || []).filter(u => inRange(u.referred_at || u.created_at));
  const lastUsers = (allUsers || []).filter(u => inLast(u.referred_at || u.created_at));
  const coms = (allCommissions || []).filter(c => inRange(c.created_at));
  const lastComs = (allCommissions || []).filter(c => inLast(c.created_at));

  const filterUI = (
    <div className="sp-filter-bar">
      <button className={"drp-btn" + (showFilter ? " on" : "")} onClick={() => setShowFilter(v=>!v)}>
        📅 {range.start} ～ {range.end} ▾
      </button>
      {showFilter && <DateRangePicker value={range} onChange={r => { setRange(r); setShowFilter(false); }} />}
    </div>
  );

  return { range, ships, lastShips, users, lastUsers, coms, lastComs, filterUI };
}
