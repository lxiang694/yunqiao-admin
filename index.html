function SpFinance({ sp, data }) {
  const allShips = data?.shipments || [];
  const allComs = data?.commissions || [];
  const { ships, lastShips, coms, lastComs, filterUI } = useSpDateFilter(allShips, [], allComs, "created_at");

  const rmb = ships.reduce((s, x) => s + (x.currency === "RMB" ? Number(x.freight_amount||0) : 0), 0);
  const twd = ships.reduce((s, x) => s + (x.currency === "TWD" ? Number(x.freight_amount||0) : 0), 0);
  const lastRmb = lastShips.reduce((s, x) => s + (x.currency === "RMB" ? Number(x.freight_amount||0) : 0), 0);
  const lastTwd = lastShips.reduce((s, x) => s + (x.currency === "TWD" ? Number(x.freight_amount||0) : 0), 0);
  const pendingCom = coms.filter(c => c.status === "pending").reduce((s, c) => s + Number(c.commission_twd), 0);
  const settledCom = coms.filter(c => c.status === "settled").reduce((s, c) => s + Number(c.commission_twd), 0);
  const lastPending = lastComs.filter(c => c.status === "pending").reduce((s, c) => s + Number(c.commission_twd), 0);

  // 全期累計
  const totalPending = allComs.filter(c => c.status === "pending").reduce((s, c) => s + Number(c.commission_twd), 0);
  const totalSettled = allComs.filter(c => c.status === "settled").reduce((s, c) => s + Number(c.commission_twd), 0);

  return (
    <div>
      <div className="page-h-row"><h2 className="page-t">財務明細</h2></div>

      {/* 累計總覽 */}
      <div className="stats-row" style={{marginBottom:12}}>
        <div className="stat-card highlight"><b>NT$ {Math.round(totalPending)}</b><span>累計待結算佣金</span></div>
        <div className="stat-card"><b>NT$ {Math.round(totalSettled)}</b><span>累計已結佣金</span></div>
        <div className="stat-card"><b>{sp.commission_rate}%</b><span>佣金比例</span></div>
      </div>

      {filterUI}
      <div className="kpi-grid" style={{marginBottom:12}}>
        <KpiCard label="期間 RMB 收入" value={`¥${rmb.toFixed(2)}`} trend={lastRmb} trendLabel={`上月 ¥${lastRmb.toFixed(2)}`} highlight />
        <KpiCard label="期間 TWD 收入" value={`NT$${twd.toFixed(2)}`} trend={lastTwd} trendLabel={`上月 NT$${lastTwd.toFixed(2)}`} highlight />
        <KpiCard label="期間待結佣金" value={`NT$${Math.round(pendingCom)}`} trend={lastPending} trendLabel={`上月 NT$${Math.round(lastPending)}`} />
        <KpiCard label="期間已結佣金" value={`NT$${Math.round(settledCom)}`} />
      </div>

      <div className="card">
        <h3 className="sec">佣金記錄（{coms.length} 筆）</h3>
        {coms.length === 0 ? <div className="muted">此時段無佣金記錄</div> : (
          <table className="tbl">
            <thead><tr><th>訂單</th><th>金額（TWD）</th><th>比例</th><th>佣金</th><th>狀態</th><th>建立時間</th><th>結算時間</th></tr></thead>
            <tbody>{coms.map(c => (
              <tr key={c.id}>
                <td className="mono">{c.order_no}</td>
                <td>NT${c.order_amount}</td>
                <td>{c.commission_rate}%</td>
                <td><b>NT${c.commission_twd}</b></td>
                <td><span className={"chip " + (c.status === "settled" ? "chip-leaf" : "chip-sea")}>{c.status === "settled" ? "已結" : "待結"}</span></td>
                <td className="sm">{new Date(c.created_at).toLocaleDateString()}</td>
                <td className="sm">{c.settled_at ? new Date(c.settled_at).toLocaleDateString() : "-"}</td>
              </tr>
            ))}</tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function SpRates({ sp, spSession, reloadSp, flash }) {
  const [platform, setPlatform] = useState(null);
  const [f, setF] = useState({
    use_custom_rates: !!sp.use_custom_rates,
    custom_price_per_kg: sp.custom_price_per_kg ?? "",
    custom_rate_rmb: sp.custom_rate_rmb ?? "",
    custom_rate_twd: sp.custom_rate_twd ?? "",
    custom_fee_home: sp.custom_fee_home ?? "",
    custom_fee_711: sp.custom_fee_711 ?? "",
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  useEffect(() => {
    // 取平台價（業務員不需登入也能讀，因為 RLS 允許 anon read settings）
    fetch(`${SUPA_URL}/rest/v1/settings?id=eq.1&select=price_per_kg,rate_rmb,rate_twd,fee_home,fee_711`, {
      headers: { apikey: ANON },
    }).then(r => r.json()).then(rows => setPlatform(rows[0] || null)).catch(() => {});
  }, []);
  const upd = (k, v) => setF({ ...f, [k]: v });
  const save = async () => {
    setErr(""); setBusy(true);
    try {
      const payload = { ...f };
      ["custom_price_per_kg","custom_rate_rmb","custom_rate_twd","custom_fee_home","custom_fee_711"]
        .forEach(k => { payload[k] = payload[k] === "" ? null : Number(payload[k]); });
      await spApiCall("updateRates", payload, spSession.sp_token, spSession.sp_id);
      await reloadSp();
      flash("已儲存費率設定");
    } catch (e) { setErr(e.message); }
    setBusy(false);
  };
  const hint = (k) => platform ? <div className="hint sm">平台價：{platform[k]}（不得低於此價）</div> : null;

  return (
    <div>
      <h2 className="page-t">我的費率設定</h2>
      <div className="card">
        <div className="hint" style={{ marginBottom: 14, lineHeight: 1.7 }}>
          您可以設定自己客戶看到的費率與匯率。<br />
          <b style={{ color: "#B91C1C" }}>注意：所有費率不得低於平台價。</b>儲存後立即生效，名下新訂單會自動使用您的費率。
        </div>
        <label className="switch">
          <input type="checkbox" checked={f.use_custom_rates} onChange={(e) => upd("use_custom_rates", e.target.checked)} />
          <span><b>啟用自訂費率</b>（不啟用則使用平台統一價）</span>
        </label>

        {f.use_custom_rates && (
          <div className="form-grid" style={{ marginTop: 14 }}>
            <label className="fld"><span>每公斤運費（RMB）</span>
              <input type="number" step="0.01" value={f.custom_price_per_kg} onChange={(e) => upd("custom_price_per_kg", e.target.value)} placeholder={platform ? `平台 ${platform.price_per_kg}` : ""} />
              {hint("price_per_kg")}
            </label>
            <label className="fld"><span>宅配匯率（RMB→TWD）</span>
              <input type="number" step="0.001" value={f.custom_rate_rmb} onChange={(e) => upd("custom_rate_rmb", e.target.value)} placeholder={platform ? `平台 ${platform.rate_rmb}` : ""} />
              {hint("rate_rmb")}
            </label>
            <label className="fld"><span>7-11 匯率（RMB→TWD）</span>
              <input type="number" step="0.001" value={f.custom_rate_twd} onChange={(e) => upd("custom_rate_twd", e.target.value)} placeholder={platform ? `平台 ${platform.rate_twd}` : ""} />
              {hint("rate_twd")}
            </label>
            <label className="fld"><span>宅配派件費（TWD）</span>
              <input type="number" step="1" value={f.custom_fee_home} onChange={(e) => upd("custom_fee_home", e.target.value)} placeholder={platform ? `平台 ${platform.fee_home}` : ""} />
              {hint("fee_home")}
            </label>
            <label className="fld"><span>7-11 派件費（TWD）</span>
              <input type="number" step="1" value={f.custom_fee_711} onChange={(e) => upd("custom_fee_711", e.target.value)} placeholder={platform ? `平台 ${platform.fee_711}` : ""} />
              {hint("fee_711")}
            </label>
          </div>
        )}
        {err && <div className="err">{err}</div>}
        <button className="btn primary block" disabled={busy} onClick={save}>{busy ? "儲存中…" : "儲存費率"}</button>
      </div>
    </div>
  );
}

function SpProfile({ sp, spSession, reloadSp, flash }) {
  const [f, setF] = useState({
    wechat: sp.wechat || "",
    wechat_qr_url: sp.wechat_qr_url || "",
    line_id: sp.line_id || "",
    whatsapp: sp.whatsapp || "",
    alipay_qr_url: sp.alipay_qr_url || "",
    old_password: "",
    new_password: "",
    new_password2: "",
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [alipayPreview, setAlipayPreview] = useState(sp.alipay_qr_url || null);
  const upd = (k, v) => setF({ ...f, [k]: v });

  // 上傳支付寶二維碼到 Storage
  const uploadAlipay = async (file) => {
    if (!file) return;
    try {
      const ext = file.name.split(".").pop() || "jpg";
      const path = `sp-alipay/${spSession.sp_id}_${Date.now()}.${ext}`;
      const formData = new FormData();
      formData.append("", file);
      const res = await fetch(
        `${SUPA_URL}/storage/v1/object/payment-qr/${path}`,
        { method: "POST", headers: { apikey: ANON, Authorization: `Bearer ${spSession.sp_token}` }, body: file }
      );
      if (!res.ok) throw new Error("上傳失敗");
      // 取公開 URL
      const pub = `${SUPA_URL}/storage/v1/object/public/payment-qr/${path}`;
      setAlipayPreview(pub);
      setF(prev => ({ ...prev, alipay_qr_url: pub }));
      flash("支付寶二維碼已上傳");
    } catch (e) { flash(`上傳失敗：${e.message}`); }
  };

  const save = async () => {
    setErr(""); setBusy(true);
    try {
      const payload = {
        wechat: f.wechat || null,
        wechat_qr_url: f.wechat_qr_url || null,
        line_id: f.line_id || null,
        whatsapp: f.whatsapp || null,
        alipay_qr_url: f.alipay_qr_url || null,
      };
      if (f.new_password) {
        if (f.new_password !== f.new_password2) throw new Error("兩次新密碼不一致");
        if (f.new_password.length < 6) throw new Error("新密碼至少 6 碼");
        payload.old_password = f.old_password;
        payload.new_password = f.new_password;
      }
      await spApiCall("updateProfile", payload, spSession.sp_token, spSession.sp_id);
      await reloadSp();
      setF(prev => ({ ...prev, old_password: "", new_password: "", new_password2: "" }));
      flash("已儲存");
    } catch (e) { setErr(e.message); }
    setBusy(false);
  };
  return (
    <div>
      <h2 className="page-t">個人設定</h2>
      <div className="card">
        <h3 className="sec">基本資訊</h3>
        <label className="fld"><span>姓名</span><input value={sp.name} disabled /></label>
        <label className="fld"><span>登入帳號</span><input className="mono" value={sp.username} disabled /></label>
        <label className="fld"><span>推廣碼</span><input className="mono" value={sp.promo_code} disabled /></label>
        <label className="fld"><span>佣金比例</span><input value={`${sp.commission_rate}%`} disabled /></label>
        <div className="hint sm">以上資訊由總後台管理，如需修改請聯繫公司管理員</div>
      </div>

      <div className="card">
        <h3 className="sec">聯繫方式（您客戶看到的客服資訊）</h3>
        <div className="form-grid">
          <label className="fld"><span>微信號</span><input className="mono" value={f.wechat} onChange={(e) => upd("wechat", e.target.value)} /></label>
          <label className="fld"><span>微信二維碼 URL</span><input className="mono" value={f.wechat_qr_url} onChange={(e) => upd("wechat_qr_url", e.target.value)} placeholder="https://..." /></label>
          <label className="fld"><span>LINE ID</span><input className="mono" value={f.line_id} onChange={(e) => upd("line_id", e.target.value)} placeholder="不要加 @" /></label>
          <label className="fld"><span>WhatsApp</span><input className="mono" value={f.whatsapp} onChange={(e) => upd("whatsapp", e.target.value)} placeholder="+886912345678" /></label>
        </div>
      </div>

      <div className="card">
        <h3 className="sec">支付寶收款碼（用於佣金結算）</h3>
        <div className="hint" style={{ marginBottom: 12, lineHeight: 1.7 }}>
          上傳您的支付寶收款二維碼，總後台進行佣金結算時會掃碼轉帳給您。
        </div>
        <div className="alipay-upload-box">
          {alipayPreview ? (
            <div className="alipay-preview-wrap">
              <img className="alipay-preview" src={alipayPreview} alt="支付寶收款碼" />
              <div className="alipay-preview-label">✅ 已設定支付寶收款碼</div>
            </div>
          ) : (
            <div className="alipay-empty">📱 尚未上傳支付寶收款碼</div>
          )}
          <label className="alipay-upload-btn">
            {alipayPreview ? "重新上傳" : "📤 上傳支付寶收款碼"}
            <input type="file" accept="image/*" hidden onChange={e => uploadAlipay(e.target.files?.[0])} />
          </label>
        </div>
        <div className="hint sm" style={{ marginTop: 8 }}>支援 JPG、PNG 格式。請確保二維碼清晰可掃描。</div>
      </div>

      <div className="card">
        <h3 className="sec">修改密碼</h3>
        <div className="form-grid">
          <label className="fld"><span>舊密碼</span><input type="password" value={f.old_password} onChange={(e) => upd("old_password", e.target.value)} placeholder="留空表示不改密碼" /></label>
          <label className="fld"><span>新密碼</span><input type="password" value={f.new_password} onChange={(e) => upd("new_password", e.target.value)} placeholder="至少 6 碼" /></label>
          <label className="fld"><span>確認新密碼</span><input type="password" value={f.new_password2} onChange={(e) => upd("new_password2", e.target.value)} /></label>
        </div>
      </div>

      {err && <div className="err">{err}</div>}
      <button className="btn primary block" disabled={busy} onClick={save}>{busy ? "儲存中…" : "儲存"}</button>
    </div>
  );
}

/* scanner frame & line */

.scan-close:active{background:rgba(0,0,0,.75)}
@keyframes scanline{0%{top:18%}50%{top:82%}100%{top:18%}}

.settle-upload:active{border-color:#1B3A6B}
.settle-proof-preview{width:100%;height:100%;object-fit:contain}
.settle-note{width:100%;border:1.5px solid #DCD9CF;border-radius:9px;padding:9px 11px;
  font-size:14px;font-family:inherit;margin-top:7px;outline:none}
.settle-note:focus{border-color:#1B3A6B}

/* ── 業務員個人設定：支付寶上傳區 ── */
.alipay-upload-box{background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:12px;
  padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.alipay-preview-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.alipay-preview{width:160px;height:160px;border-radius:10px;object-fit:contain;
  border:1px solid #DBEAFE;background:#fff}
.alipay-preview-label{font-size:12.5px;color:#065F46;font-weight:600}
.alipay-empty{color:#9aa6a9;font-size:13.5px;padding:18px}
.alipay-upload-btn{background:#1B3A6B;color:#fff;border:0;border-radius:9px;
  padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit}
.alipay-upload-btn:active{background:#2d5fa8}

/* ── 統計 / 日期篩選 ── */
.drp{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:14px}
.drp-presets{display:flex;gap:6px;flex-wrap:wrap}
.drp-btn{border:1.5px solid #DCD9CF;background:#fff;color:#374151;border-radius:20px;
  padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .12s;white-space:nowrap}
.drp-btn:hover{border-color:#1B3A6B;color:#1B3A6B}
.drp-btn.on{background:#1B3A6B;border-color:#1B3A6B;color:#fff}
.drp-custom{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.drp-custom input{border:1.5px solid #DCD9CF;border-radius:9px;padding:7px 10px;
  font-size:13px;font-family:inherit;outline:none;color:#0E2A33}
.drp-custom input:focus{border-color:#1B3A6B}
.drp-range{font-size:12px;color:#9aa6a9}
.stats-filters{display:flex;flex-wrap:wrap;align-items:flex-start;gap:12px;margin-bottom:16px;
  background:#F5F6F4;border-radius:12px;padding:12px 16px}
.stats-sp-select{border:1.5px solid #DCD9CF;border-radius:9px;padding:7px 10px;
  font-size:13px;font-family:inherit;color:#0E2A33;background:#fff;outline:none}
.stats-sp-select:focus{border-color:#1B3A6B}

/* ── KPI 卡片 ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.kpi-card{background:#fff;border:1.5px solid #E0E3E0;border-radius:12px;padding:14px 16px}
.kpi-card.highlight{border-color:#F5A623;background:#FFFBF0}
.kpi-label{font-size:12px;color:#5a6a6e;margin-bottom:6px;font-weight:600;letter-spacing:.2px;text-transform:uppercase}
.kpi-value{font-family:'Space Grotesk';font-size:22px;font-weight:700;color:#0E2A33;margin-bottom:2px}
.kpi-card.highlight .kpi-value{color:#c97800}
.kpi-sub{font-size:11.5px;color:#9aa6a9;margin-bottom:4px}
.kpi-trend{display:flex;align-items:center;gap:6px;margin-top:4px}
.kpi-prev{font-size:11px;color:#9aa6a9}
.trend-badge{font-size:11.5px;font-weight:700;padding:2px 7px;border-radius:12px}
.trend-badge.up{background:#D1FAE5;color:#065F46}
.trend-badge.down{background:#FEE2E2;color:#B91C1C}
.trend-na{color:#9aa6a9;font-size:12px}

/* ── 折線圖 ── */
.chart-wrap{overflow-x:auto}
.chart-empty{text-align:center;color:#9aa6a9;padding:28px;font-size:13px}
.chart-label{font-size:12.5px;font-weight:600;color:#5a6a6e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.chart-ctrl{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.chart-ctrl-title{font-size:14px;font-weight:700;color:#0E2A33}
.chart-ctrl-tabs{display:flex;gap:4px;flex-wrap:wrap}
.chart-tab{border:1.5px solid #DCD9CF;background:#fff;color:#5a6a6e;border-radius:8px;
  padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.chart-tab.on{background:#1B3A6B;border-color:#1B3A6B;color:#fff}
.tbl-head-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tbl-total td{background:#F5F6F4;font-weight:700;border-top:2px solid #DCD9CF !important}

/* ── 總覽擴充 ── */
.ov-section-title{display:flex;justify-content:space-between;align-items:center;
  margin:24px 0 12px;padding-top:16px;border-top:1.5px solid #E0E3E0}
.ov-section-title span:first-child{font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#0E2A33}
.ov-section-hint{font-size:12px;color:#9aa6a9}
.rank-tabs{display:flex;gap:4px}
.rank-tab{border:1.5px solid #DCD9CF;background:#fff;color:#5a6a6e;border-radius:8px;
  padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.rank-tab.on{background:#1B3A6B;border-color:#1B3A6B;color:#fff}
.rank-bar-wrap{display:flex;align-items:center;gap:6px;min-width:80px}
.rank-bar{height:8px;border-radius:4px;background:linear-gradient(90deg,#1B3A6B,#F5A623);min-width:2px;transition:width .4s ease}
.rank-bar-wrap span{font-size:11.5px;color:#5a6a6e;white-space:nowrap}
.organic-row td{background:#FFFBF0 !important}
.sp-name-tag{font-weight:600;font-size:13px}
.sp-name-tag.organic{color:#c97800}

/* ── 業務員後台篩選 ── */
.sp-filter-bar{display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px;
  margin-bottom:14px;padding:10px 14px;background:#F5F6F4;border-radius:10px}
`;
